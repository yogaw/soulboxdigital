<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoulBox Jakarta</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #0d0d0d;
            --bg-1: #121212;
            --surface-1: rgba(26, 26, 26, 0.85);
            --surface-2: rgba(33, 33, 33, 0.95);
            --border: rgba(255, 255, 255, 0.12);
            --border-strong: rgba(255, 255, 255, 0.18);
            --text: #ffffff;
            --text-2: rgba(255, 255, 255, 0.72);
            --text-3: rgba(255, 255, 255, 0.55);
            --gold: #D4AF37;
            --gold-2: #B8941F;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(1200px 700px at 40% -100px, rgba(212, 175, 55, 0.16), transparent 60%),
                linear-gradient(180deg, #2a2f3a 0%, var(--bg-1) 50%, var(--bg-0) 100%);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Layout */
        #app {
            width: 100%;
            min-height: 100vh;
            max-width: 100%;
            overflow-x: hidden;
        }

        /* Navigation - Mobile Optimized */
        .main-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(16, 16, 16, 0.7);
            backdrop-filter: blur(6px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            width: 44px;
            height: 44px;
            background: #000;
            border-radius: 50%;
            display: grid;
            place-items: center;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .logo img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            opacity: 0.9;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            min-width: 44px;
            min-height: 44px;
            align-items: center;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-strong);
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .icon-btn:hover,
        .icon-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        /* App Header - Mobile Optimized */
        .app-header {
            padding: 15px 20px;
            background: rgba(16, 16, 16, 0.55);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--border);
        }

        .user-greeting h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            color: var(--text);
            line-height: 1.2;
        }

        .motivation-text {
            color: var(--text-2);
            font-size: 13px;
            line-height: 1.3;
        }

        /* Screens */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .weekly-classes-container {
            padding: 15px;
            max-width: 100%;
            margin: 0 auto;
            width: 100%;
        }

        .schedule-header {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #444444;
            text-align: center;
        }

        .studio-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .studio-logo {
            background: #000;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            border: 1px solid #444444;
        }

        .studio-title h3 {
            color: #fff;
            font-size: 20px;
            margin: 0;
            line-height: 1.2;
        }

        .studio-location {
            color: #888;
            font-size: 13px;
            line-height: 1.4;
        }

        .weekly-schedule {
            background: var(--surface-1);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .schedule-title {
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
        }

        /* Day Navigation Tabs - Mobile Optimized */
        .day-navigation {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: thin;
            scrollbar-color: #444 #1a1a1a;
            -webkit-overflow-scrolling: touch;
        }

        .day-navigation::-webkit-scrollbar {
            height: 4px;
        }

        .day-navigation::-webkit-scrollbar-track {
            background: rgba(26, 26, 26, 0.8);
            border-radius: 2px;
        }

        .day-navigation::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }

        .day-tab {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid #444444;
            color: #888;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .day-tab:hover,
        .day-tab:active {
            background: #333;
            color: #fff;
            transform: translateY(-1px);
        }

        .day-tab.active {
            background: linear-gradient(135deg, #D4AF37 0%, #B8941F 100%);
            color: #fff;
            border-color: #D4AF37;
            box-shadow: 0 8px 18px rgba(212, 175, 55, 0.18);
        }

        .day-tab-name {
            font-weight: 600;
            font-size: 12px;
            line-height: 1.1;
        }

        .day-tab-date {
            font-size: 10px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .day-tab-class-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #D4AF37;
            color: #fff;
            border-radius: 8px;
            padding: 1px 5px;
            font-size: 9px;
            font-weight: 600;
            min-width: 16px;
            text-align: center;
        }

        /* Search and Filter Section - Mobile Optimized */
        .search-filter-section {
            background: rgba(26, 26, 26, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #444444;
            display: none;
        }

        .search-filter-section.active {
            display: block;
        }

        .search-container {
            position: relative;
            margin-bottom: 15px;
        }

        /* Day Content Container */
        .day-content {
            display: none;
        }

        .day-content.active {
            display: block;
        }

        .day-header {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .day-title {
            font-size: 16px;
            font-weight: 600;
        }

        .day-stats {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-3);
        }

        /* Class List - Mobile Optimized */
        .class-list {
            display: grid;
            gap: 12px;
        }

        .class-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            cursor: default;
            transition: background 0.2s ease, border-color 0.2s ease;
            position: relative;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            align-items: start;
            -webkit-tap-highlight-color: transparent;
        }

        .class-item.past {
            opacity: 0.5;
            background: rgba(255, 255, 255, 0.015);
            border-color: rgba(255, 255, 255, 0.06);
            filter: saturate(0.7);
        }

        .class-item:hover,
        .class-item:active {
            background: rgba(255, 255, 255, 0.065);
            border-color: rgba(212, 175, 55, 0.25);
        }

        .class-item.selected {
            border-color: #D4AF37;
            background: rgba(76, 175, 80, 0.1);
        }

        .class-main-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .class-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .class-name {
            color: var(--text);
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .class-subtext {
            color: var(--text-3);
            font-size: 11px;
            margin-bottom: 6px;
        }

        .class-title-tag {
            display: inline-flex;
            align-items: center;
            margin-left: 8px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.06);
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .contact-fab {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 150;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            text-decoration: none;
            border: 1px solid rgba(0, 0, 0, 0.18);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
            -webkit-tap-highlight-color: transparent;
        }

        .contact-fab:active {
            transform: translateY(1px);
        }

        .contact-fab i {
            font-size: 15px;
        }

        .weekly-classes-container {
            padding-bottom: 110px;
        }

        @media (min-width: 768px) {
            .weekly-classes-container {
                padding-bottom: 40px;
            }
        }

        .class-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            color: var(--text-3);
            font-size: 12px;
        }

        .class-time {
            color: #D4AF37;
            font-weight: 500;
        }

        .class-instructor {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .class-spots {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            padding: 3px 6px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 500;
        }

        .class-spots.full {
            background: rgba(37, 211, 102, 0.18);
            color: #25D366;
        }

        .class-spots.cancelled {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .class-spots.low {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }

        .waitlist-count {
            background: rgba(156, 39, 176, 0.2);
            color: #ce93d8;
            padding: 3px 6px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .waitlist-count i {
            font-size: 9px;
        }

        .class-actions {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .class-type-badge {
            background: #D4AF37;
            color: #fff;
            padding: 3px 6px;
            border-radius: 5px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .quick-book-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #B8941F 100%);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .quick-book-btn:hover,
        .quick-book-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }

        .quick-book-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .waitlist-btn {
            background: transparent;
            border: 1px solid #ce93d8;
            color: #ce93d8;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }

        .waitlist-btn:hover,
        .waitlist-btn:active {
            background: rgba(156, 39, 176, 0.15);
            transform: translateY(-1px);
        }

        .waitlist-btn i {
            font-size: 10px;
        }

        .class-item.class-full {
            opacity: 0.85;
            border-color: rgba(37, 211, 102, 0.28);
        }

        .class-item.class-full .class-name {
            position: relative;
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ccc;
        }

        .empty-state-text {
            font-size: 14px;
            line-height: 1.5;
        }

        /* Smooth Transitions */
        .day-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .class-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .day-content {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .day-content:not(.active) {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .day-content.active {
            opacity: 1;
            transform: translateY(0);
        }

        .quick-book-btn {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .quick-book-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .quick-book-btn:active::before {
            width: 300px;
            height: 300px;
        }

        /* Loading States */
        .loading {
            position: relative;
            overflow: hidden;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: loading-shimmer 1.5s infinite;
        }

        @keyframes loading-shimmer {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        /* Success Animation */
        .success-animation {
            animation: success-pulse 0.6s ease;
        }

        @keyframes success-pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Tab Switch Animation */
        .tab-switch-indicator {
            position: absolute;
            bottom: 0;
            height: 3px;
            background: #D4AF37;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 3px;
        }

        /* Class Item Hover Effects */
        .class-item:hover .class-type-badge {
            transform: scale(1.1);
        }

        .class-type-badge {
            transition: transform 0.2s ease;
        }

        /* Filter Checkbox Animation */
        .filter-option input[type="checkbox"] {
            transition: all 0.2s ease;
        }

        .filter-option input[type="checkbox"]:checked + label {
            color: #D4AF37;
            font-weight: 500;
        }

        /* Smooth Scroll for Mobile */
        html {
            scroll-behavior: smooth;
        }

        /* Booking Section - Mobile Optimized */
        .booking-section {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
            opacity: 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #444444;
        }

        .booking-section.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .selected-class-display {
            background: rgba(26, 26, 26, 0.8);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #444444;
        }

        .selected-class-title {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .selected-class-details {
            color: #888;
            font-size: 13px;
            line-height: 1.4;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .payment-method {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid #444444;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        .payment-method:hover,
        .payment-method:active {
            background: #333;
            transform: translateY(-1px);
        }

        .payment-method.selected {
            border-color: #D4AF37;
            background: rgba(76, 175, 80, 0.1);
        }

        .payment-method i {
            font-size: 20px;
            margin-bottom: 8px;
            display: block;
            color: #D4AF37;
        }

        .payment-method-name {
            color: #fff;
            font-weight: 500;
            font-size: 13px;
        }

        .payment-details {
            background: rgba(26, 26, 26, 0.8);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #444444;
        }

        .payment-detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #444;
        }

        .payment-detail-item:last-child {
            border-bottom: none;
        }

        .payment-detail-item.total {
            font-weight: 600;
            color: #D4AF37;
            font-size: 16px;
            padding-top: 12px;
            border-top: 2px solid #444;
        }

        .payment-detail-label {
            color: #888;
            font-size: 13px;
        }

        .payment-detail-value {
            color: #fff;
            font-weight: 500;
            font-size: 13px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #D4AF37 0%, #B8941F 100%);
            color: white;
        }

        .btn-secondary {
            background: #333;
            color: #888;
            border: 1px solid #444444;
        }

        .btn:hover,
        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Ripple Effect for Buttons */
        .ripple {
            position: relative;
            overflow: hidden;
        }

        .ripple .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .selected-class-display {
            background: rgba(26, 26, 26, 0.8);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #444444;
        }

        .selected-class-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .selected-class-details {
            color: #888;
            font-size: 14px;
            line-height: 1.5;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .payment-method {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid #444444;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .payment-method:hover {
            background: #333;

        .waitlist-success {

    </style>
</head>
<body>
    <div id="app">
        <nav class="main-nav">
            <div class="logo">
                <img src="assets/images/soulboxlogo.png" alt="SOULBOX">
            </div>
            <div class="header-actions"></div>
        </nav>

        <div id="group-class-screen" class="screen active">
            <header class="app-header">
                <div class="user-greeting">
                    <h2>GROUP CLASSES</h2>
                    <p class="motivation-text">SOULBOX Senopati</p>
                </div>
            </header>

            <div class="weekly-classes-container">
                <div class="weekly-schedule">
                    <div class="schedule-header">
                        <div class="schedule-title">This Week's Classes</div>
                    </div>

                    <div class="day-navigation" id="dayNavigation"></div>

                    <div id="dayContentContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <a class="contact-fab" href="https://wa.me/628111510030" target="_blank" rel="noopener" aria-label="Chat admin on WhatsApp">
        <i class="fab fa-whatsapp"></i>
        Chat admin
    </a>

    <script>
        window.SB_SCHEDULE_API_URL = 'https://script.google.com/macros/s/AKfycbx_FiaMzcgeccug7Xu5_XBNraP1wyezwd0vO1O2akh89CMGRSrni4D34umTDmUOF-TVCA/exec';
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

            function pad2(n) {
                return String(n).padStart(2, '0');
            }

            function toISODate(d) {
                return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
            }

            function parseISODate(iso) {
                const [y, m, day] = String(iso).split('-').map(Number);
                return new Date(y, m - 1, day);
            }

            function getCurrentMondayISO() {
                const today = new Date();
                const day = today.getDay();
                const mondayOffset = day === 0 ? -6 : 1 - day;
                const monday = new Date(today);
                monday.setDate(today.getDate() + mondayOffset);
                monday.setHours(0, 0, 0, 0);
                return toISODate(monday);
            }

            function getDefaultDayIndex(weekStartISO) {
                const monday = parseISODate(weekStartISO);
                monday.setHours(0, 0, 0, 0);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const diffDays = Math.floor((today.getTime() - monday.getTime()) / (24 * 60 * 60 * 1000));
                if (diffDays >= 0 && diffDays <= 6) return diffDays;
                return 0;
            }

            function createEmptyScheduleData() {
                return daysOfWeek.reduce((acc, d) => {
                    acc[d] = [];
                    return acc;
                }, {});
            }

            function base64UrlDecodeUtf8(b64url) {
                const padded = String(b64url || '').replaceAll('-', '+').replaceAll('_', '/').padEnd(Math.ceil(String(b64url || '').length / 4) * 4, '=');
                const binary = atob(padded);
                const bytes = Array.from(binary, c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
                return decodeURIComponent(bytes);
            }

            function getQueryParam(name) {
                try {
                    return new URLSearchParams(window.location.search || '').get(name) || '';
                } catch {
                    return '';
                }
            }

            function removeQueryParam(name) {
                try {
                    const url = new URL(window.location.href);
                    url.searchParams.delete(name);
                    window.history.replaceState(null, '', url.pathname + (url.search ? url.search : '') + (url.hash ? url.hash : ''));
                } catch {}
            }

            function hydrateRemoteApiUrlFromQuery() {
                const apiUrl = getQueryParam('apiUrl');
                if (!apiUrl) return false;
                remoteApiUrl = String(apiUrl || '').trim();
                return true;
            }

            const REMOTE_API_URL_DEFAULT = '';
            let remoteApiUrl = '';

            function getRemoteApiUrl() {
                const globalUrl = (typeof window !== 'undefined' && window.SB_SCHEDULE_API_URL) ? String(window.SB_SCHEDULE_API_URL) : '';
                return String(remoteApiUrl || globalUrl || REMOTE_API_URL_DEFAULT || '').trim();
            }

            async function fetchJsonWithTimeout(url, options = {}, timeoutMs = 10000) {
                const ctrl = new AbortController();
                const t = setTimeout(() => ctrl.abort(), timeoutMs);
                try {
                    const res = await fetch(url, { ...options, signal: ctrl.signal });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } finally {
                    clearTimeout(t);
                }
            }

            //#region debug-point group-class-no-data
            function setScheduleDebug(patch) {
                try {
                    const prev = (window.__sbScheduleDebug && typeof window.__sbScheduleDebug === 'object') ? window.__sbScheduleDebug : {};
                    window.__sbScheduleDebug = { ...prev, ...patch };
                } catch {}
            }
            //#endregion debug-point group-class-no-data

            function loadJsonp(url, timeoutMs = 12000) {
                return new Promise((resolve, reject) => {
                    const cbName = `__sbJsonpCb_${Math.random().toString(16).slice(2)}_${Date.now().toString(16)}`;
                    let done = false;

                    const cleanup = () => {
                        if (done) return;
                        done = true;
                        try { delete window[cbName]; } catch { window[cbName] = undefined; }
                        if (script && script.parentNode) script.parentNode.removeChild(script);
                        if (timer) clearTimeout(timer);
                    };

                    const timer = setTimeout(() => {
                        cleanup();
                        reject(new Error('JSONP timeout'));
                    }, timeoutMs);

                    window[cbName] = (data) => {
                        cleanup();
                        resolve(data);
                    };

                    let finalUrl = url;
                    try {
                        const u = new URL(url);
                        u.searchParams.set('callback', cbName);
                        u.searchParams.set('_', String(Date.now()));
                        finalUrl = u.toString();
                    } catch {}

                    const script = document.createElement('script');
                    script.src = finalUrl;
                    script.async = true;
                    script.onerror = () => {
                        cleanup();
                        reject(new Error('JSONP load error'));
                    };
                    document.head.appendChild(script);
                });
            }

            async function importScheduleFromRemotePublished() {
                const apiUrl = getRemoteApiUrl();
                if (!apiUrl) {
                    //#region debug-point group-class-no-data
                    setScheduleDebug({ ok: false, stage: 'no-api-url', at: Date.now() });
                    //#endregion debug-point group-class-no-data
                    return false;
                }

                let url = '';
                try {
                    const u = new URL(apiUrl);
                    u.searchParams.set('action', 'published');
                    url = u.toString();
                } catch {
                    //#region debug-point group-class-no-data
                    setScheduleDebug({ ok: false, stage: 'bad-api-url', at: Date.now(), apiUrl });
                    //#endregion debug-point group-class-no-data
                    return false;
                }

                try {
                    let data = null;
                    try {
                        data = await fetchJsonWithTimeout(url, { method: 'GET' }, 12000);
                    } catch {
                        data = await loadJsonp(url, 12000);
                    }
                    const weekStart = data && data.weekStart ? String(data.weekStart) : '';
                    const items = data && Array.isArray(data.schedule) ? data.schedule : null;
                    if (!weekStart || !items) return false;
                    activeWeekStartISO = weekStart;
                    scheduleData = mapScheduleItemsToScheduleData(items);
                    //#region debug-point group-class-no-data
                    setScheduleDebug({ ok: true, stage: 'loaded', at: Date.now(), url, weekStart, count: items.length });
                    //#endregion debug-point group-class-no-data
                    return true;
                } catch {
                    //#region debug-point group-class-no-data
                    setScheduleDebug({ ok: false, stage: 'load-failed', at: Date.now(), url });
                    //#endregion debug-point group-class-no-data
                    return false;
                }
            }

            let activeWeekStartISO = getCurrentMondayISO();

            let scheduleData = createEmptyScheduleData();

            function mapScheduleItemsToScheduleData(items) {
                if (!Array.isArray(items) || items.length === 0) return createEmptyScheduleData();

                const next = createEmptyScheduleData();

                items.forEach(item => {
                    if (!item || !item.date || !item.start) return;
                    const d = new Date(`${item.date}T00:00:00`);
                    const dayName = d.toLocaleDateString('en-US', { weekday: 'long' });
                    if (!next[dayName]) return;

                    const cap = Number(item.capacity) || 0;
                    const att = Number(item.attendance) || 0;
                    const rawStatus = String(item.status || 'scheduled');
                    const isCancelled = rawStatus === 'cancelled';
                    const computedFull = !isCancelled && cap > 0 && att >= cap;
                    const isFull = rawStatus === 'full' || computedFull;
                    const status = isCancelled ? 'cancelled' : isFull ? 'full' : 'scheduled';
                    const available = Math.max(cap - att, 0);

                    next[dayName].push({
                        name: String(item.name || 'CLASS'),
                        tag: String(item.tag || ''),
                        dateISO: String(item.date || ''),
                        time: String(item.start),
                        durationMinutes: Number(item.duration) || 60,
                        instructor: String(item.trainer || ''),
                        spots: status === 'cancelled' ? 0 : available,
                        type: String(item.location || 'GROUP'),
                        status,
                        waitlist: Number(item.waitlistCount || 0),
                        capacity: cap,
                        attendance: att
                    });
                });

                daysOfWeek.forEach(day => {
                    next[day].sort((a, b) => String(a.time).localeCompare(String(b.time)));
                });

                return next;
            }

            function classEndEpochMsJakarta(dateISO, hhmm, durationMinutes) {
                const d = String(dateISO || '').trim();
                const t = String(hhmm || '').trim();
                if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) return null;
                if (!/^\d{2}:\d{2}$/.test(t)) return null;

                const startMs = Date.parse(`${d}T${t}:00+07:00`);
                if (!Number.isFinite(startMs)) return null;

                const dur = Number(durationMinutes);
                const safeDur = Number.isFinite(dur) && dur > 0 ? dur : 60;
                return startMs + safeDur * 60 * 1000;
            }

            function generateDayNavigation() {
                const dayNavigation = document.getElementById('dayNavigation');
                const defaultDayIndex = getDefaultDayIndex(activeWeekStartISO);

                dayNavigation.innerHTML = '';

                daysOfWeek.forEach((day, index) => {
                    const dayTab = document.createElement('div');
                    dayTab.className = 'day-tab';
                    if (index === defaultDayIndex) {
                        dayTab.classList.add('active');
                    }

                    const dayClasses = scheduleData[day] || [];
                    const classCount = dayClasses.length;

                    dayTab.innerHTML = `
                        <div class="day-tab-name">${day.substring(0, 3).toUpperCase()}</div>
                        <div class="day-tab-date">${getClassDate(index)}</div>
                        ${classCount > 0 ? `<div class="day-tab-class-count">${classCount}</div>` : ''}
                    `;

                    dayTab.addEventListener('click', () => selectDay(day, dayTab));
                    dayNavigation.appendChild(dayTab);
                });
            }

            function getClassDate(dayIndex) {
                const monday = parseISODate(activeWeekStartISO);
                const targetDate = new Date(monday);
                targetDate.setDate(monday.getDate() + dayIndex);
                return targetDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            function generateDayContent() {
                const dayContentContainer = document.getElementById('dayContentContainer');
                const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

                dayContentContainer.innerHTML = '';

                daysOfWeek.forEach(day => {
                    const dayContent = document.createElement('div');
                    dayContent.className = 'day-content';
                    dayContent.id = `${day.toLowerCase()}-content`;

                    const dayClasses = scheduleData[day] || [];

                    dayContent.innerHTML = `
                        <div class="day-header">
                            <div class="day-title">${day}</div>
                            <div class="day-stats">
                                <span>${dayClasses.length} classes</span>
                                <span>${dayClasses.reduce((sum, cls) => sum + cls.spots, 0)} total spots</span>
                            </div>
                        </div>
                        <div class="class-list" id="${day.toLowerCase()}-classes">
                            ${dayClasses.length > 0 ? generateClassItems(dayClasses, day) : generateEmptyState(day)}
                        </div>
                    `;

                    dayContentContainer.appendChild(dayContent);
                });

                const defaultDayIndex = getDefaultDayIndex(activeWeekStartISO);
                const defaultContent = document.getElementById(`${daysOfWeek[defaultDayIndex].toLowerCase()}-content`);
                if (defaultContent) defaultContent.classList.add('active');
            }

            function generateClassItems(classes, day) {
                return classes.map(classInfo => {
                    const isCancelled = classInfo.status === 'cancelled';
                    const isFull = classInfo.status === 'full';
                    const isLow = classInfo.spots > 0 && classInfo.spots <= 2;
                    const spotsClass = isCancelled ? 'cancelled' : isFull ? 'full' : isLow ? 'low' : '';
                    const spotsText = isCancelled ? 'Cancelled' : isFull ? 'Full' : `${classInfo.spots} spot${classInfo.spots === 1 ? '' : 's'}`;

                    const endMs = classEndEpochMsJakarta(classInfo.dateISO, classInfo.time, classInfo.durationMinutes);
                    const isPast = !isCancelled && endMs != null && endMs < Date.now();

                    return `
                    <div class="class-item ${isFull ? 'class-full' : ''} ${isPast ? 'past' : ''}">
                        <div class="class-main-info">
                            <div class="class-header-row">
                                <div class="class-name">${classInfo.name}${classInfo.tag ? ` <span class="class-title-tag">${classInfo.tag}</span>` : ''}</div>
                                <div class="class-type-badge">${classInfo.type}</div>
                            </div>
                            ${classInfo.subtext ? `<div class="class-subtext">${classInfo.subtext}</div>` : ''}
                            <div class="class-meta">
                                <div class="class-time"><i class="fas fa-clock"></i> ${classInfo.time}</div>
                                <div class="class-instructor"><i class="fas fa-user"></i> ${classInfo.instructor}</div>
                                <div class="class-spots ${spotsClass}">${spotsText}</div>
                                ${(!isCancelled && isFull && Number(classInfo.waitlist || 0) > 0) ? `<div class="waitlist-count"><i class="fas fa-clock"></i> ${Number(classInfo.waitlist)} waiting</div>` : ''}
                            </div>
                        </div>
                    </div>
                `}).join('');
            }

            function generateEmptyState(day) {
                return `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-calendar-xmark"></i>
                        </div>
                        <div class="empty-state-title">No classes on ${day}</div>
                        <div class="empty-state-text">Check another day for available classes</div>
                    </div>
                `;
            }

            function selectDay(day, tabElement) {
                document.querySelectorAll('.day-tab').forEach(tab => tab.classList.remove('active'));
                document.querySelectorAll('.day-content').forEach(content => content.classList.remove('active'));

                tabElement.classList.add('active');
                const contentElement = document.getElementById(`${day.toLowerCase()}-content`);
                if (contentElement) {
                    contentElement.classList.add('active');
                }
            }

            async function refreshScheduleUI() {
                hydrateRemoteApiUrlFromQuery();
                const apiUrl = getRemoteApiUrl();
                activeWeekStartISO = getCurrentMondayISO();
                scheduleData = createEmptyScheduleData();

                if (apiUrl) await importScheduleFromRemotePublished();
                generateDayNavigation();
                generateDayContent();
            }

            refreshScheduleUI();

        });
    </script>
